name: Live drift check

# Runs the integration tests against the live City of Cape Town Feature Service
# to catch upstream drift (moved layer IDs, renamed filter/order-by columns).
# Network-dependent, so it runs on a schedule and on demand rather than on every
# push. A failure here means the live service changed, not that a PR is broken.

permissions:
  contents: read

on:
  schedule:
    - cron: "17 4 * * *" # daily at 04:17 UTC
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26"

      - name: Integration tests (live service)
        run: go test -tags=integration -run TestLive -v ./...
